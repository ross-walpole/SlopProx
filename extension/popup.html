<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #080d09;
      color: #6db88a;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 12px;
      user-select: none;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 1px,
        rgba(0,255,80,0.015) 1px, rgba(0,255,80,0.015) 2px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px 10px;
      border-bottom: 1px solid #2a4d2e;
      background: #040908;
    }
    .prompt-chev { color: #b84fa0; text-shadow: 0 0 8px rgba(184,79,160,0.5); font-size: 13px; }
    .prompt-cur  { color: #9dd4b0; animation: blink 1.1s step-end infinite; font-size: 13px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .header-title {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #9dd4b0;
    }

    .status-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-label {
      font-size: 8px;
      letter-spacing: 0.12em;
      color: #4a8a62;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #2a4d2e; flex-shrink: 0;
    }
    .status-dot.on  {
      background: #6db88a;
      box-shadow: 0 0 5px rgba(109,184,138,0.7);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.off { background: #7f3030; }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 5px rgba(109,184,138,0.7); }
      50%      { opacity:0.5; box-shadow: none; }
    }

    /* ── Stats strip ── */
    .stats {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid #2a4d2e;
    }
    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 6px 10px;
      gap: 4px;
      position: relative;
    }
    .stat + .stat::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 1px;
      background: #2a4d2e;
    }
    .stat-num {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      tabular-nums: true;
      color: #6db88a;
      text-shadow: 0 0 10px rgba(109,184,138,0.4);
    }
    .stat-num.amber  { color: #d4a044; text-shadow: 0 0 10px rgba(212,160,68,0.35); }
    .stat-num.violet { color: #9d86e0; text-shadow: 0 0 10px rgba(157,134,224,0.35); }
    .stat-num.red    { color: #c06060; text-shadow: 0 0 10px rgba(192,96,96,0.35); }
    .stat-label {
      font-size: 8px;
      color: #4a8a62;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .footer-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #4a8a62; flex-shrink: 0;
    }
    .footer-text {
      font-size: 9px;
      color: #4a8a62;
      letter-spacing: 0.08em;
    }

    /* ── Offline state ── */
    .off-msg {
      padding: 16px 14px;
      color: #4a8a62;
      font-size: 11px;
      line-height: 1.6;
      text-align: center;
      letter-spacing: 0.04em;
    }
    .off-msg span {
      display: block;
      color: #7f3030;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="prompt-chev">&gt;</span><span class="prompt-cur">_</span>
    <span class="header-title">SLOPPROX</span>
    <div class="status-wrap">
      <span class="status-label" id="statusLabel">OFFLINE</span>
      <span class="status-dot" id="dot"></span>
    </div>
  </div>

  <div id="main">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="textCount">—</div>
        <div class="stat-label">TEXT</div>
      </div>
      <div class="stat">
        <div class="stat-num amber" id="adsCount">—</div>
        <div class="stat-label">ADS</div>
      </div>
      <div class="stat">
        <div class="stat-num violet" id="imgCount">—</div>
        <div class="stat-label">IMG</div>
      </div>
      <div class="stat">
        <div class="stat-num red" id="ytCount">—</div>
        <div class="stat-label">YT</div>
      </div>
    </div>
    <div class="footer">
      <div class="footer-dot"></div>
      <div class="footer-text" id="footerText">Connected to local service</div>
    </div>
  </div>

  <div id="offline" style="display:none" class="off-msg">
    <span>APP OFFLINE</span>
    Start SlopProx to activate.
  </div>

<script src="popup.js"></script>
</body>
</html>
